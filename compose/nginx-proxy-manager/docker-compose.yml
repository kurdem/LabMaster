# Nginx Proxy Manager - reverse proxy + Let's Encrypt UI.
# Uses the built-in SQLite database (no extra DB container required).
services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    environment:
      TZ: ${TIMEZONE}
    ports:
      - "${NPM_HTTP_PORT}:80"     # public HTTP
      - "${NPM_HTTPS_PORT}:443"   # public HTTPS
      - "${NPM_ADMIN_PORT}:81"    # admin UI
    volumes:
      - ${DOCKER_ROOT}/data/nginx-proxy-manager/data:/data
      - ${DOCKER_ROOT}/data/nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "/bin/check-health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  proxy:
    external: true
